services:
  postgres:
    image: postgres:16
    container_name: evolua-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolua
      POSTGRES_USER: db
      POSTGRES_PASSWORD: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: